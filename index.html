<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lola Cuts · Peluquería</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;1,6..72,300;1,6..72,400;1,6..72,700&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream:      #fff8f0;
  --bone:       #f5ede0;
  --blush:      #e8d5c4;
  --terracota:  #924621;
  --terracota2: #b15e37;
  --bark:       #54433c;
  --espresso:   #1e1b14;
  --outline:    #87736a;
}

html { -webkit-font-smoothing: antialiased; }

body {
  background: var(--cream);
  color: var(--espresso);
  font-family: 'Manrope', sans-serif;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
  position: relative;
}

/* ── GRAIN ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
  opacity: 0.035;
  pointer-events: none;
  z-index: 100;
}

/* ── FONDO DECORATIVO ── */
.bg-circle {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
}
.bg-circle-1 {
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(177,94,55,0.10) 0%, transparent 70%);
  top: -150px; right: -150px;
}
.bg-circle-2 {
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(146,70,33,0.07) 0%, transparent 70%);
  bottom: -100px; left: -120px;
}

/* ── WRAPPER ── */
.page {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 420px;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  padding: 0 24px 64px;
}

/* ── HEADER ── */
header {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 64px;
  padding-bottom: 48px;
  text-align: center;
}

.monogram-ring {
  position: relative;
  width: 80px;
  height: 80px;
  margin-bottom: 28px;
}

.monogram-ring svg.ring {
  position: absolute;
  inset: 0;
  animation: spin 18s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.monogram-inner {
  position: absolute;
  inset: 8px;
  border-radius: 50%;
  background: var(--bone);
  border: 1px solid rgba(146,70,33,0.15);
  display: flex;
  align-items: center;
  justify-content: center;
}

.monogram-letter {
  font-family: 'Newsreader', serif;
  font-style: italic;
  font-size: 1.8rem;
  font-weight: 300;
  color: var(--terracota);
  line-height: 1;
}

h1 {
  font-family: 'Newsreader', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 2.8rem;
  letter-spacing: -0.02em;
  color: var(--espresso);
  line-height: 1;
  margin-bottom: 10px;
}

.subtitle {
  font-size: 0.62rem;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--outline);
  font-weight: 500;
}

/* ── SEPARADOR ── */
.divider {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 32px;
}
.divider-line { flex: 1; height: 1px; background: var(--blush); }
.divider-diamond {
  width: 5px; height: 5px;
  background: var(--terracota);
  transform: rotate(45deg);
  flex-shrink: 0;
  opacity: 0.5;
}

/* ── LINKS ── */
.links {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 32px;
}

.link-btn {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 24px;
  text-decoration: none;
  font-family: 'Manrope', sans-serif;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  border-radius: 2px;
  transition: all 0.35s cubic-bezier(0.23, 1, 0.32, 1);
  position: relative;
  overflow: hidden;
}

.link-btn-left {
  display: flex;
  align-items: center;
  gap: 14px;
}

.link-icon {
  width: 20px; height: 20px;
  opacity: 0.7;
  flex-shrink: 0;
  transition: opacity 0.3s;
}

.link-arrow {
  font-size: 0.9rem;
  opacity: 0.4;
  transition: transform 0.3s, opacity 0.3s;
}

.link-btn:hover .link-arrow {
  transform: translateX(4px);
  opacity: 0.8;
}

.link-btn:hover .link-icon { opacity: 1; }

/* Botón primario */
.btn-primary {
  background: linear-gradient(135deg, var(--terracota) 0%, var(--terracota2) 100%);
  color: white;
  box-shadow: 0 4px 20px rgba(146,70,33,0.25);
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 32px rgba(146,70,33,0.32);
}
.btn-primary .link-icon { opacity: 0.85; filter: brightness(10); }

/* Botones secundarios */
.btn-secondary {
  background: var(--bone);
  color: var(--bark);
  border: 1px solid var(--blush);
}
.btn-secondary:hover {
  background: white;
  border-color: rgba(146,70,33,0.2);
  color: var(--terracota);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.06);
}

/* ── HORARIOS ── */
.horarios {
  background: var(--bone);
  border: 1px solid var(--blush);
  border-radius: 2px;
  padding: 32px 28px;
  margin-bottom: 28px;
  position: relative;
  overflow: hidden;
}

.horarios::before {
  content: 'horarios';
  position: absolute;
  bottom: -12px;
  right: 16px;
  font-family: 'Newsreader', serif;
  font-style: italic;
  font-size: 4rem;
  color: rgba(146,70,33,0.05);
  pointer-events: none;
  line-height: 1;
  white-space: nowrap;
}

.horarios-title {
  font-family: 'Newsreader', serif;
  font-style: italic;
  font-size: 1.15rem;
  font-weight: 400;
  color: var(--espresso);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.horarios-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--blush);
}

.horarios-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 8px 0;
  border-bottom: 1px solid rgba(218,193,184,0.4);
  font-size: 0.78rem;
}
.horarios-row:last-child { border-bottom: none; padding-bottom: 0; }

.horarios-dia {
  color: var(--bark);
  font-weight: 400;
}
.horarios-hora {
  color: var(--espresso);
  font-weight: 600;
  font-size: 0.72rem;
  letter-spacing: 0.05em;
}

.horarios-nota {
  margin-top: 18px;
  padding-top: 14px;
  border-top: 1px solid var(--blush);
  font-size: 0.62rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--outline);
  text-align: center;
}

/* ── FOTO ── */
.foto-wrap {
  border-radius: 2px;
  overflow: hidden;
  aspect-ratio: 4/3;
  margin-bottom: 28px;
  position: relative;
}

.foto-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: grayscale(0.15) contrast(1.05);
  transition: transform 0.8s cubic-bezier(0.23, 1, 0.32, 1);
}

.foto-wrap:hover img { transform: scale(1.03); }

.foto-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(30,27,20,0.3) 0%, transparent 50%);
}

.foto-caption {
  position: absolute;
  bottom: 16px;
  left: 20px;
  font-family: 'Newsreader', serif;
  font-style: italic;
  font-size: 0.85rem;
  color: rgba(255,248,240,0.8);
  letter-spacing: 0.05em;
}

/* ── FOOTER ── */
footer {
  margin-top: auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  padding-top: 16px;
}

.footer-brand {
  font-size: 0.6rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--blush);
}

.footer-brand a {
  color: var(--terracota);
  text-decoration: none;
  opacity: 0.7;
  transition: opacity 0.2s;
}
.footer-brand a:hover { opacity: 1; }

/* ── ANIMACIONES DE ENTRADA ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

header { animation: fadeUp 0.8s cubic-bezier(0.23, 1, 0.32, 1) both; }
.divider { animation: fadeUp 0.8s 0.1s cubic-bezier(0.23, 1, 0.32, 1) both; }
.links .link-btn:nth-child(1) { animation: fadeUp 0.7s 0.15s cubic-bezier(0.23, 1, 0.32, 1) both; }
.links .link-btn:nth-child(2) { animation: fadeUp 0.7s 0.22s cubic-bezier(0.23, 1, 0.32, 1) both; }
.links .link-btn:nth-child(3) { animation: fadeUp 0.7s 0.29s cubic-bezier(0.23, 1, 0.32, 1) both; }
.horarios { animation: fadeUp 0.7s 0.36s cubic-bezier(0.23, 1, 0.32, 1) both; }
.foto-wrap { animation: fadeUp 0.7s 0.43s cubic-bezier(0.23, 1, 0.32, 1) both; }
footer { animation: fadeUp 0.7s 0.5s cubic-bezier(0.23, 1, 0.32, 1) both; }
</style>
</head>
